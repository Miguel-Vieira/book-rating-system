# Test configuration - uses in-memory SQLite
quarkus.datasource.jdbc.url=jdbc:sqlite::memory:
quarkus.hibernate-orm.database.generation=drop-and-create

# Disable caching in tests to prevent cross-test contamination
quarkus.cache.enabled=false

# REST client URL not needed since MockGutendexClient replaces the bean via @Mock
quarkus.rest-client."com.bookrating.client.GutendexClient".url=http://localhost:9999/unused

quarkus.application.name=book-rating-system
quarkus.http.port=8080

# SQLite
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:bookrating.db
quarkus.datasource.jdbc.max-size=1

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
quarkus.hibernate-orm.log.sql=false

# Gutendex client
quarkus.rest-client."com.bookrating.gateway.gutendex.GutendexClient".url=https://gutendex.com
quarkus.rest-client."com.bookrating.gateway.gutendex.GutendexClient".connect-timeout=5000
quarkus.rest-client."com.bookrating.gateway.gutendex.GutendexClient".read-timeout=10000
quarkus.rest-client."com.bookrating.gateway.gutendex.GutendexClient".follow-redirects=true

# Cache TTLs
quarkus.cache.caffeine."gutendex-book".expire-after-write=15M
quarkus.cache.caffeine."gutendex-search".expire-after-write=5M

# OpenAPI
quarkus.smallrye-openapi.info-title=Book Rating System
quarkus.smallrye-openapi.info-version=1.0.0

# Jackson
quarkus.jackson.fail-on-unknown-properties=false